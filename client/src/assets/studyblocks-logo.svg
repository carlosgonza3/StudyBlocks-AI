<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Isometric blocks logo -->
    <g transform="translate(5, 5)">
        <!-- Bottom block - darkest base -->
        <!-- Left face -->
        <path d="M 15 32.5 L 25 27.5 L 25 42.5 L 15 37.5 Z" fill="#171717"/>
        <!-- Right face - darkest -->
        <path d="M 25 27.5 L 35 32.5 L 35 37.5 L 25 42.5 Z" fill="#0a0a0a"/>
        <!-- Top face - lightest -->
        <path d="M 15 32.5 L 25 27.5 L 35 32.5 L 25 37.5 Z" fill="#262626"/>

        <!-- Middle block - medium tones -->
        <!-- Left face -->
        <path d="M 20 22.5 L 30 17.5 L 30 32.5 L 20 27.5 Z" fill="#262626"/>
        <!-- Right face - darkest -->
        <path d="M 30 17.5 L 40 22.5 L 40 27.5 L 30 32.5 Z" fill="#171717"/>
        <!-- Top face - lightest -->
        <path d="M 20 22.5 L 30 17.5 L 40 22.5 L 30 27.5 Z" fill="#404040"/>

        <!-- Top block - lightest overall -->
        <!-- Left face -->
        <path d="M 10 17.5 L 20 12.5 L 20 27.5 L 10 22.5 Z" fill="#404040"/>
        <!-- Right face - darkest -->
        <path d="M 20 12.5 L 30 17.5 L 30 22.5 L 20 27.5 Z" fill="#262626"/>
        <!-- Top face - lightest -->
        <path d="M 10 17.5 L 20 12.5 L 30 17.5 L 20 22.5 Z" fill="#525252"/>
    </g>

    <!-- StudyBlocks text -->
    <text x="50" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#000000">StudyBlocks</text>
</svg>
