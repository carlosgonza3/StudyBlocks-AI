<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Isometric blocks logo - White variant -->
    <g transform="translate(5, 5)">
        <!-- Bottom block -->
        <!-- Left face -->
        <path d="M 15 32.5 L 25 27.5 L 25 42.5 L 15 37.5 Z" fill="#d9d9d9"/>
        <!-- Right face - darkest -->
        <path d="M 25 27.5 L 35 32.5 L 35 37.5 L 25 42.5 Z" fill="#b3b3b3"/>
        <!-- Top face - lightest -->
        <path d="M 15 32.5 L 25 27.5 L 35 32.5 L 25 37.5 Z" fill="#ffffff"/>

        <!-- Middle block -->
        <!-- Left face -->
        <path d="M 20 22.5 L 30 17.5 L 30 32.5 L 20 27.5 Z" fill="#d9d9d9"/>
        <!-- Right face - darkest -->
        <path d="M 30 17.5 L 40 22.5 L 40 27.5 L 30 32.5 Z" fill="#b3b3b3"/>
        <!-- Top face - lightest -->
        <path d="M 20 22.5 L 30 17.5 L 40 22.5 L 30 27.5 Z" fill="#ffffff"/>

        <!-- Top block -->
        <!-- Left face -->
        <path d="M 10 17.5 L 20 12.5 L 20 27.5 L 10 22.5 Z" fill="#d9d9d9"/>
        <!-- Right face - darkest -->
        <path d="M 20 12.5 L 30 17.5 L 30 22.5 L 20 27.5 Z" fill="#b3b3b3"/>
        <!-- Top face - lightest -->
        <path d="M 10 17.5 L 20 12.5 L 30 17.5 L 20 22.5 Z" fill="#ffffff"/>
    </g>

    <!-- StudyBlocks text -->
    <text x="50" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#ffffff">StudyBlocks</text>
</svg>
